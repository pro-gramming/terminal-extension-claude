name: Release

# Triggers when you push a version tag like v0.0.1, v1.2.0, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build VSIX and create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Package VSIX
        run: npm run package

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Terminal AI ${{ github.ref_name }}
          body: |
            ## Install

            1. Download `${{ steps.vsix.outputs.file }}` below
            2. In VS Code: `Extensions` → `···` → `Install from VSIX…`
            3. Select the downloaded file

            ## Requirements
            - [Claude Code CLI](https://claude.ai/code) installed and authenticated
            - macOS or Linux

            ## What's new
            See [CHANGELOG](https://github.com/pro-gramming/terminal-extension-claude/commits/${{ github.ref_name }}) for details.
          files: ${{ steps.vsix.outputs.file }}
          draft: false
          prerelease: false
