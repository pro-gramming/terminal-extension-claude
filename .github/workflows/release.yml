name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Runs on every push and PR ─────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  # ── Runs only when a version tag is pushed ────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run package

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Build release body
        run: |
          cat <<EOF > /tmp/release_body.md
          ## Install

          \`\`\`bash
          curl -L https://github.com/pro-gramming/terminal-extension-claude/releases/download/${{ github.ref_name }}/${{ steps.vsix.outputs.file }} \\
            -o terminal-ai.vsix && \\
            code --install-extension terminal-ai.vsix
          \`\`\`

          ---

          EOF
          cat RELEASE_NOTES.md >> /tmp/release_body.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VSIX="${{ steps.vsix.outputs.file }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --title "Terminal AI $TAG" --notes-file /tmp/release_body.md --draft=false
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" --title "Terminal AI $TAG" --notes-file /tmp/release_body.md --draft=false "$VSIX"
          fi
